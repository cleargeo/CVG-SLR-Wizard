[pytest]
# =============================================================================
# CVG SLR Wizard — pytest configuration
# =============================================================================
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib

markers =
    unit: Pure unit tests (no network, no file I/O)
    integration: Tests that require real data files or network
    slow: Tests that take > 5 seconds

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
